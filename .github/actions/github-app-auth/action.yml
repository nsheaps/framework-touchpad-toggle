name: "GitHub App Authentication"
description: "Authenticate as a GitHub App and configure git user settings"

branding:
  icon: "lock"
  color: "blue"

inputs:
  app-id:
    description: "GitHub App ID"
    required: true

  private-key:
    description: "GitHub App private key"
    required: true

  owner:
    description: "Repository owner (defaults to current repository owner)"
    required: false
    default: ${{ github.repository_owner }}

outputs:
  token:
    description: "GitHub App token"
    value: ${{ steps.app-token.outputs.token }}

  app-slug:
    description: "GitHub App slug name"
    value: ${{ steps.app-token.outputs.app-slug }}

  user-id:
    description: "GitHub App bot user ID"
    value: ${{ steps.get-user-id.outputs.user-id }}

  user-name:
    description: "GitHub App bot user name (app slug with [bot] suffix)"
    value: ${{ steps.get-user-id.outputs.user-name }}

  user-email:
    description: "GitHub App bot no-reply email (for commit attribution)"
    value: ${{ steps.get-user-id.outputs.user-email }}

runs:
  using: "composite"
  steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ inputs.owner }}

    - name: Get GitHub App User ID
      id: get-user-id
      shell: bash
      run: |
        user_id="$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)"
        user_name="${{ steps.app-token.outputs.app-slug }}[bot]"
        {
          echo "user-id=${user_id}"
          echo "user-name=${user_name}"
          echo "user-email=${user_id}+${user_name}@users.noreply.github.com"
        } >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}

    - name: Configure git
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        gh auth setup-git
        echo "GH_TOKEN=${GH_TOKEN}" >> $GITHUB_ENV
        echo "GITHUB_TOKEN=${GH_TOKEN}" >> $GITHUB_ENV
        git config --global user.name '${{ steps.get-user-id.outputs.user-name }}'
        git config user.name '${{ steps.get-user-id.outputs.user-name }}'
        git config --global user.email '${{ steps.get-user-id.outputs.user-email }}'
        git config user.email '${{ steps.get-user-id.outputs.user-email }}'

    - name: Configure repo checkout token
      uses: actions/checkout@v6
      with:
        token: ${{ steps.app-token.outputs.token }}
        clean: false
        persist-credentials: true
