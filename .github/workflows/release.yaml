name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout and authenticate as GitHub App
        id: auth
        uses: nsheaps/github-actions/.github/actions/checkout-as-app@603052841cd49b9fdc99bc32979ff9c45c9b669e # checkout-as-app@main
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: yarn install

      - name: Run release-it
        id: release
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          yarn release-it --ci
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout and authenticate as GitHub App
        id: auth
        uses: nsheaps/github-actions/.github/actions/checkout-as-app@603052841cd49b9fdc99bc32979ff9c45c9b669e # checkout-as-app@main
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Get job context
        id: context
        uses: qoomon/actions--context@v5

      - name: Get release info
        id: release
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          TAG="${{ needs.release.outputs.tag }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Download archive tarball and calculate SHA256
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          echo "Downloading tarball from: $TARBALL_URL"
          curl -fsSL "$TARBALL_URL" -o /tmp/archive.tar.gz
          SHA256=$(sha256sum /tmp/archive.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Successfully got SHA256: $SHA256"

      - name: Clone homebrew-devsetup
        run: |
          gh repo clone nsheaps/homebrew-devsetup homebrew-devsetup

      - name: Render formula with tag + sha
        env:
          TAG: ${{ steps.release.outputs.tag }}
          SHA256: ${{ steps.release.outputs.sha256 }}
        run: |
          cp Formula/framework-touchpad-toggle.rb homebrew-devsetup/Formula/framework-touchpad-toggle.rb
          # Update url tag and sha256 in the copied formula.
          sed -i -E \
            -e "s|/archive/refs/tags/v[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz|/archive/refs/tags/${TAG}.tar.gz|" \
            -e "s|sha256 \"[0-9a-f]{64}\"|sha256 \"${SHA256}\"|" \
            homebrew-devsetup/Formula/framework-touchpad-toggle.rb
          echo "Rendered formula:"
          cat homebrew-devsetup/Formula/framework-touchpad-toggle.rb

      - name: Close stale formula PRs
        run: |
          cd homebrew-devsetup
          gh pr list --state open --search "chore: update framework-touchpad-toggle to" --json number,title --jq '.[].number' | while read -r pr_num; do
            echo "Closing superseded PR #${pr_num}"
            gh pr close "$pr_num" --comment "Superseded by v${{ steps.release.outputs.version }} update."
          done

      - name: Create PR to update formula
        id: formula-pr
        env:
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag }}
          JOB_URL: ${{ steps.context.outputs.job_url }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          cd homebrew-devsetup
          BRANCH="bump-framework-touchpad-toggle-${VERSION}"

          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add Formula/framework-touchpad-toggle.rb
          git commit -m "chore: update framework-touchpad-toggle to ${VERSION}"
          git push -u origin "$BRANCH"

          printf 'Automated formula update from framework-touchpad-toggle release\n\n**Release:** %s\n**Workflow:** %s\n' "$RELEASE_URL" "$JOB_URL" > /tmp/pr-body.md

          PR_URL=$(gh pr create \
            --title "chore: update framework-touchpad-toggle to ${VERSION}" \
            --body-file /tmp/pr-body.md \
            --base main)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge with retry
        env:
          PR_URL: ${{ steps.formula-pr.outputs.pr_url }}
        run: |
          for attempt in 1 2 3 4 5; do
            if gh pr merge "$PR_URL" --auto --squash; then
              echo "Auto-merge enabled successfully on attempt ${attempt}"
              exit 0
            fi
            wait=$((attempt * 10))
            echo "Auto-merge not ready (attempt ${attempt}/5), waiting ${wait}s..."
            sleep "$wait"
          done
          echo "::warning::Could not enable auto-merge after 5 attempts. PR was created successfully at ${PR_URL} — merge manually or re-run."
