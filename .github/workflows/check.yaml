---
name: check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  # On push (to main): unique group per SHA so every push builds.
  # On PR: group by ref so a new push cancels the in-flight run.
  group: ${{ github.event_name == 'push' && github.sha || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Single CI gate (`check` — referenced by branch protection in
  # .github/settings.yml). Auto-fixes what it can (shfmt) before running the
  # read-only gate `mise run check` (lint + fmt-check + test). If anything was
  # rewritten or a non-fixable check failed, the writes are committed back to
  # the PR branch and the job exits 1 so CI re-runs against the final state.
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout and authenticate as GitHub App
        id: auth
        uses: nsheaps/github-actions/.github/actions/checkout-as-app@603052841cd49b9fdc99bc32979ff9c45c9b669e # checkout-as-app@main
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: ${{ github.event_name == 'pull_request' }}

      - name: Auto-fix formatting and run checks
        id: check
        continue-on-error: true
        run: |
          set +e
          had_failure=false

          # Auto-fix what we can (shfmt) before the read-only gate sees the tree.
          mise run fmt || had_failure=true
          # The single CI gate: lint + fmt-check + test.
          mise run check || had_failure=true

          changed=false
          if [ -n "$(git status --porcelain)" ]; then
            changed=true
          fi

          if [ "$had_failure" = "true" ] || [ "$changed" = "true" ]; then
            echo "changed-or-failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed-or-failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit auto-fixes
        if: steps.check.outputs.changed-or-failed == 'true' && ! cancelled()
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: `mise run fmt`'
          commit_user_name: ${{ steps.auth.outputs.user-name }}
          commit_user_email: ${{ steps.auth.outputs.user-email }}

      - name: Fail if changes were made or checks failed
        if: steps.check.outputs.changed-or-failed == 'true' && ! cancelled()
        run: |
          echo "Auto-committed formatting fixes and/or a non-fixable check failed."
          echo "A re-run on the new commit will pass once remaining issues are resolved."
          exit 1
