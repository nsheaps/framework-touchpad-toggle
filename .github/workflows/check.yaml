name: check

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Authenticate as GitHub App and checkout
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Lint, format, and test (auto-fix)
        id: check
        continue-on-error: true
        run: |
          set +e
          has_errors=false

          # Auto-fix formatting first so the gate below sees a clean tree.
          mise run fmt || has_errors=true
          # The single CI gate: lint + fmt-check + test.
          mise run check || has_errors=true

          has_changes=false
          if [ -n "$(git status --porcelain)" ]; then
            has_changes=true
          fi

          if [ "$has_errors" = "true" ] || [ "$has_changes" = "true" ]; then
            echo "changed-or-failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed-or-failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit auto-fixes
        if: steps.check.outputs.changed-or-failed == 'true' && ! cancelled()
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: `mise run fmt`'
          commit_user_name: ${{ steps.auth.outputs.user-name }}
          commit_user_email: ${{ steps.auth.outputs.user-email }}

      - name: EditorConfig check
        uses: editorconfig-checker/action-editorconfig-checker@main

      - name: Run editorconfig-checker
        run: editorconfig-checker

      - name: Fail if changes were made or checks failed
        if: steps.check.outputs.changed-or-failed == 'true' && ! cancelled()
        run: |
          echo "Auto-committed formatting fixes or checks failed."
          echo "Re-run on the new commit will pass once remaining issues are resolved."
          exit 1
