# Project-level plugin configuration overrides.
# These settings take precedence over plugin defaults.
# See each plugin's <plugin-name>.settings.yaml for available options.
#
# Mirrored from /home/user/ai-mktpl/.claude/plugins.settings.yaml so the
# github-app plugin can mint a token from secrets injected by 1pass.

github:
  # gh is managed by mise (see mise.toml: gh = "latest").
  # The plugin still runs gh auth status to verify authentication.
  autoInstall: false

github-app:
  enabled: true
  autoGitConfig: true

mise:
  autoInstallTools: true
  autoTrust: true

edit-utils:
  formatter: 'prettier --write'

1pass:
  enabled: true
  autoInstall: true
  installOpExec: true
  # Individual secrets (field-level references)
  secrets:
    - envVar: BRAINTRUST_API_KEY
      reference: 'op://AI-Jack/Braintrust/api-key'
      target: userSettingsJson
  # Expose entire 1Password item as environment variables via op-exec.
  # All STRING/CONCEALED fields in the item become env vars
  # (field labels → UPPER_SNAKE_CASE). op:// references in field values
  # are resolved recursively.
  opExec:
    items:
      - 'op://AI-Jack/ENVIRONMENT'
    targets:
      - sessionStartBashEnv
      - userSettings
