[tools]
node = "lts"
yarn = "4"
shellcheck = "latest"
shfmt = "latest"
editorconfig-checker = "latest"

[tasks.lint]
description = "Lint shell sources (ShellCheck) and check editorconfig compliance"
run = [
  "shellcheck bin/framework-touchpad-toggle lib/*.sh test/*.sh",
  # editorconfig-checker's CLI binary is `ec` (aqua:editorconfig-checker/editorconfig-checker).
  "ec",
]

[tasks.test]
description = "Run CLI smoke tests"
run = "bash test/smoke.sh"

[tasks.fmt]
description = "Auto-format all shell sources with shfmt"
run = "shfmt -w -i 2 -ci bin/framework-touchpad-toggle lib/*.sh test/*.sh"

[tasks.fmt-check]
description = "Check shell formatting with shfmt (no writes)"
run = "shfmt -d -i 2 -ci bin/framework-touchpad-toggle lib/*.sh test/*.sh"

[tasks.check]
description = "Run all checks (lint + fmt-check + test) — the single CI gate"
depends = ["lint", "fmt-check", "test"]
run = "echo 'All checks passed'"

[tasks.release]
description = "Cut a release with release-it (conventional commits)"
run = "yarn dlx release-it"

