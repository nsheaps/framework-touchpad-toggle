[tools]
node = "lts"
yarn = "4"
shellcheck = "latest"
shfmt = "latest"

[tasks.lint]
description = "Run ShellCheck on all shell sources"
run = "shellcheck bin/framework-touchpad-toggle lib/*.sh test/*.sh"

[tasks.test]
description = "Run CLI smoke tests"
run = "bash test/smoke.sh"

[tasks.fmt]
description = "Format all shell sources with shfmt"
run = "shfmt -w -i 2 -ci bin/framework-touchpad-toggle lib/*.sh test/*.sh"

[tasks.fmt-check]
description = "Check shell formatting with shfmt"
run = "shfmt -d -i 2 -ci bin/framework-touchpad-toggle lib/*.sh test/*.sh"

[tasks.check]
description = "Run all checks (lint + fmt-check + test)"
depends = ["lint", "fmt-check", "test"]
run = "echo 'All checks passed'"

[tasks.release]
description = "Cut a release with release-it (conventional commits)"
run = "yarn dlx release-it"

